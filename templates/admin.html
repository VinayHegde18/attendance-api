<!DOCTYPE html>
<html>
<head>
    <title>Attendance Admin Panel</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: #fff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            border: 1px solid #444;
        }
        th {
            background: #222;
        }
    </style>
</head>
<body>

<h2>Employee Attendance</h2>

<table id="attendanceTable">
    <thead>
        <tr>
            <th>Emp ID</th>
            <th>Event</th>
            <th>Timestamp</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
async function loadData() {
    const res = await fetch('/get_attendance');
    const data = await res.json();

    const table = document.querySelector("#attendanceTable tbody");
    table.innerHTML = "";

    data.forEach(item => {
        let row = `<tr>
            <td>${item.empId}</td>
            <td>${item.eventType}</td>
            <td>${new Date(item.timestamp).toLocaleString()}</td>
        </tr>`;
        table.innerHTML += row;
    });
}

// refresh every 5 sec
setInterval(loadData, 5000);
loadData();
</script>

</body>
</html>
